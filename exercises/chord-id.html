<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#07080c" />
<meta name="description" content="Chord identification trainer — see a chord and name it, or hear a chord and play it back. Hands-free for MIDI keyboards." />
<title>Chord Identification</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/base.css" />
<style>
  /* exercise-specific: multiple-choice answer buttons (styled like .chip pills, bigger) */
  .answers { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-bottom:22px; min-height:2px; }
  .answers:empty { display:none; }
  .answer {
    font-family: var(--font-display); font-size:16px; font-weight:600; letter-spacing:-0.01em;
    padding:12px 20px; border-radius:14px; background:var(--panel); border:1px solid var(--border);
    color:var(--text); cursor:pointer; transition:transform .18s var(--ease), border-color .18s, background .18s;
  }
  .answer:hover:not(:disabled) { transform:translateY(-2px); border-color:var(--border-strong); }
  .answer:disabled { cursor:default; }
  .answer.correct { background:linear-gradient(135deg,var(--good),#2fb488); color:#04140d; border-color:transparent; box-shadow:0 8px 22px -10px rgba(61,220,160,.9); }
  .answer.wrong { background:rgba(255,107,129,.14); border-color:var(--bad); color:var(--bad); opacity:.65; transform:none; }
</style>
</head>
<body>
<div class="wrap" id="app">
  <!-- Trainer.shell injects the topbar + MIDI help banner here -->

  <div class="hero">
    <div id="eyebrow" class="eyebrow">Name this chord</div>
    <div id="chordName" class="chord-name"><span class="root">—</span></div>
    <div id="hint" class="bassline"></div>
    <div id="promptNotes" class="prompt-notes"></div>
    <div id="tries" class="tries"></div>
    <div id="feedback" class="feedback"></div>
    <div id="liveRead" class="liveread"></div>
  </div>

  <div id="answers" class="answers"></div>

  <div class="controls">
    <button id="hearBtn" class="playbtn" aria-label="Hear it" title="Hear it"><span class="tri">▶</span></button>
    <button id="skipBtn" class="secondary">Skip ⏭</button>
    <button id="revealBtn" class="secondary">Reveal</button>
  </div>

  <div class="piano-wrap"><div id="piano" class="piano"></div></div>

  <div class="stats-row">
    <div class="stats">
      <div class="stat"><div id="streak" class="n">0</div><div class="l">Streak</div></div>
      <div class="stat"><div id="best" class="n">0</div><div class="l">Best</div></div>
      <div class="stat"><div id="correct" class="n">0</div><div class="l">Correct</div></div>
      <div class="stat"><div id="total" class="n">0</div><div class="l">Attempts</div></div>
      <div class="stat"><div id="acc" class="n">—</div><div class="l">Accuracy</div></div>
    </div>
  </div>
</div>

<script src="../shared/theory.js"></script>
<script src="../shared/audio.js"></script>
<script src="../shared/piano.js"></script>
<script src="../shared/midi.js"></script>
<script src="../shared/store.js"></script>
<script src="../shared/shell.js"></script>
<script>
"use strict";
const T = Trainer.theory;
const { CHORD_TYPES, NOTE_NAMES, ROOTS, voicing, voicingMidi } = T;
const REVEAL_AFTER = 3;

const store = Trainer.store.open("chord-id");

const state = {
  types: new Set(Object.keys(CHORD_TYPES)),
  roots: new Set(ROOTS),
  mode: "see",                 // "see" (keyboard-chord) | "hear" (ear-chord)
  current: null,
  streak: 0,
  answered: false,
  wrongTries: 0,
  lastAttemptSig: null,
  weakFocus: true,
  openVoicing: true,           // HEAR: accept any octave/bass spread of the right pitch classes
  instrument: "piano",
  opts: { autoHear:false, labels:true, sound:true },
};

function chordKey(c){ return c.rootPc+":"+c.typeKey; }
function chordName(rootPc, typeKey){ return NOTE_NAMES[rootPc] + " " + CHORD_TYPES[typeKey].label; }
function keyLabel(k){ const [r,t] = k.split(":"); return chordName(+r, t); }

// ---- settings sections (rendered inside the shared modal) ----
const settingsSections = [
  { title:"Mode", html:`
      <div class="row">
        <div class="seg" id="modeSeg">
          <button data-mode="see" class="on">See &amp; name</button>
          <button data-mode="hear">Hear &amp; play</button>
        </div>
      </div>
      <p style="color:var(--muted);font-size:13px;margin:12px 0 0;line-height:1.5;">
        <b>See &amp; name</b> highlights a chord on the keyboard — tap the matching name.<br>
        <b>Hear &amp; play</b> plays a chord — reproduce it on the keys (MIDI, mouse, or touch).</p>` },
  { title:"Chord types & roots", html:`
      <h4>Chord types</h4><div id="typeChips" class="chips"></div>
      <h4>Roots</h4><div id="rootChips" class="chips"></div>
      <div class="row" style="margin-top:14px;">
        <button id="rootsAll" class="linkbtn">All roots</button>
        <button id="rootsNat" class="linkbtn">Naturals only</button>
      </div>` },
  { title:"Matching & focus", html:`
      <div class="switch-list">
        <label class="switch"><input type="checkbox" id="openVoicing" checked /><span class="track"></span><span class="txt">Hear &amp; play: accept any octave / voicing — just play the right notes in any spread</span></label>
        <label class="switch"><input type="checkbox" id="weakFocus" checked /><span class="track"></span><span class="txt">Show my most-missed chords more often</span></label>
      </div>` },
  { title:"Audio & display", html:`
      <div class="switch-list">
        <label class="switch"><input type="checkbox" id="autoHear" /><span class="track"></span><span class="txt">Auto-play the chord on each new prompt</span></label>
        <label class="switch"><input type="checkbox" id="labels" checked /><span class="track"></span><span class="txt">Note labels on keys</span></label>
        <label class="switch"><input type="checkbox" id="sound" checked /><span class="track"></span><span class="txt">Sound when I play</span></label>
      </div>
      <div class="row">
        <label>Instrument:
          <select id="instSel">
            <option value="piano">Acoustic Piano</option>
            <option value="epiano">Electric Piano</option>
            <option value="organ">Organ</option>
            <option value="synth">Synth</option>
          </select>
        </label>
        <span id="soundNote" style="color:var(--muted);font-size:12px;">loading piano…</span>
      </div>` },
  { title:"Weak spots & saved progress", html:`
      <h4>Most-missed (saved on this device)</h4>
      <div id="weakList" class="weak-list"><span class="none">No misses recorded yet — go get some wrong. 😄</span></div>
      <div class="row"><button id="resetStats" class="linkbtn">Reset all saved stats</button></div>` },
];

const shell = Trainer.shell.mount({
  mountEl: document.getElementById("app"),
  title: "Chord Identification", subtitle: "see & hear",
  settingsSections,
});

// ---- piano + MIDI ----
const piano = Trainer.piano.create(document.getElementById("piano"), {
  labels: state.opts.labels, sound: state.opts.sound,
  onNoteOn(){ if (state.mode==="hear"){ identify(); evaluateHear(); } },
  onNoteOff(){ if (state.mode==="hear"){ state.lastAttemptSig=null; if(!state.answered) identify(); } },
});
Trainer.midi.init({
  onNoteOn: n=> piano.noteOn(n),
  onNoteOff: n=> piano.noteOff(n),
  selectEl: shell.midiSelectEl, statusEl: shell.statusEl, helpEl: shell.helpEl,
});

// ---- candidate selection (weak-spot weighted) ----
function allCandidates(){
  const out = [];
  for (const t of state.types) for (const r of state.roots) out.push({rootPc:r, typeKey:t});
  return out;
}
function weightedPick(cands){
  if (state.weakFocus){
    const weights = cands.map(c=> store.weightFor(chordKey(c)));
    let sum = weights.reduce((a,b)=>a+b,0), r = Math.random()*sum;
    for (let i=0;i<cands.length;i++){ r -= weights[i]; if (r<=0) return cands[i]; }
    return cands[cands.length-1];
  }
  return cands[Math.floor(Math.random()*cands.length)];
}
function pickRandom(){
  const cands = allCandidates();
  if (!cands.length) return;
  const chosen = weightedPick(cands);
  chosen.targetPcs = voicing(chosen.rootPc, chosen.typeKey, 0);   // root-position pitch classes
  state.current = chosen;
  piano.clear();
  state.answered = false; state.wrongTries = 0; state.lastAttemptSig = null;
  render();
  if (state.mode==="hear") setTimeout(hearTarget, 320);
  else if (state.opts.autoHear) setTimeout(hearTarget, 320);
}

// ---- render ----
function render(){
  const c = state.current;
  const nameEl = document.getElementById("chordName");
  const answersEl = document.getElementById("answers");
  document.getElementById("promptNotes").className = "prompt-notes";
  document.getElementById("promptNotes").textContent = "";
  document.getElementById("feedback").textContent = ""; document.getElementById("feedback").className = "feedback";
  document.getElementById("liveRead").textContent = ""; document.getElementById("liveRead").className = "liveread";
  document.getElementById("tries").textContent = "";
  piano.clearHighlight();

  if (!c){ nameEl.innerHTML = '<span class="root">—</span>'; answersEl.innerHTML=""; return; }

  if (state.mode==="see"){
    document.getElementById("eyebrow").textContent = "Name this chord";
    nameEl.innerHTML = '<span class="qual">🎹 What chord is this?</span>';
    document.getElementById("hint").innerHTML = "Look at the highlighted keys, then tap its name.";
    piano.highlight(c.targetPcs);
    buildAnswers();
  } else {
    document.getElementById("eyebrow").textContent = "Play what you hear";
    nameEl.innerHTML = '<span class="qual">🎧 Listen…</span>';
    document.getElementById("hint").innerHTML = "Reproduce the chord on the keys — press <b>▶</b> to replay";
    answersEl.innerHTML = "";
  }
  nameEl.classList.remove("pop"); void nameEl.offsetWidth; nameEl.classList.add("pop");
}

// ---- SEE mode: multiple-choice answers ----
function buildAnswers(){
  const c = state.current;
  const answersEl = document.getElementById("answers");
  const correct = chordKey(c);
  // distractor pool: other enabled chords with a distinct display name
  const pool = allCandidates().map(chordKey).filter(k=> k!==correct);
  const seenNames = new Set([keyLabel(correct)]);
  const distractors = [];
  shuffle(pool);
  for (const k of pool){
    const nm = keyLabel(k);
    if (seenNames.has(nm)) continue;
    seenNames.add(nm); distractors.push(k);
    if (distractors.length >= 3) break;
  }
  const options = shuffle([correct, ...distractors]);
  answersEl.innerHTML = "";
  options.forEach(k=>{
    const b = document.createElement("button");
    b.className = "answer"; b.textContent = keyLabel(k); b.dataset.key = k;
    b.onclick = ()=> evaluateSee(k, b);
    answersEl.appendChild(b);
  });
}
function evaluateSee(pickedKey, btn){
  const c = state.current;
  if (!c || state.answered) return;
  const correctKey = chordKey(c);
  store.total++;
  if (pickedKey === correctKey){
    state.answered = true;
    store.correct++; state.streak++;
    if (state.streak > store.best) store.best = state.streak;
    btn.classList.add("correct");
    disableAnswers();
    setFeedback("✅ " + chordName(c.rootPc, c.typeKey), "good");
    updateStats(); store.save();
    setTimeout(pickRandom, 850);
  } else {
    state.streak = 0; state.wrongTries++;
    store.bumpMiss(correctKey);
    btn.classList.add("wrong"); btn.disabled = true;
    setFeedback("❌ Not " + keyLabel(pickedKey) + " — try again", "bad");
    const left = REVEAL_AFTER - state.wrongTries;
    document.getElementById("tries").textContent = left > 0 ? `${state.wrongTries} wrong · answer reveals after ${REVEAL_AFTER}` : "";
    updateStats(); store.save(); renderWeakList();
    if (state.wrongTries >= REVEAL_AFTER) reveal();
  }
}
function disableAnswers(){ document.querySelectorAll("#answers .answer").forEach(b=> b.disabled = true); }

// ---- HEAR mode: play it back ----
function evaluateHear(){
  const c = state.current;
  if (!c || state.answered) return;
  const notes = [...piano.held.keys()].sort((a,b)=>a-b);
  if (!notes.length) return;
  const playedPcs = notes.map(n=>n%12);
  const uniquePcs = [...new Set(playedPcs)];
  const targetSet = new Set(c.targetPcs);
  const bassPc = playedPcs[0];

  let ok, sig;
  if (state.openVoicing){
    if (uniquePcs.length !== c.targetPcs.length) return;
    sig = [...uniquePcs].sort((a,b)=>a-b).join(",");
    if (sig === state.lastAttemptSig) return;
    ok = c.targetPcs.every(p=>uniquePcs.includes(p)) && uniquePcs.every(p=>targetSet.has(p));
  } else {
    // closed: right pitch classes AND root in the bass
    if (uniquePcs.length !== c.targetPcs.length) return;
    sig = bassPc + "|" + [...uniquePcs].sort((a,b)=>a-b).join(",");
    if (sig === state.lastAttemptSig) return;
    const rightTones = c.targetPcs.every(p=>uniquePcs.includes(p)) && uniquePcs.every(p=>targetSet.has(p));
    ok = rightTones && bassPc === c.rootPc;
  }
  state.lastAttemptSig = sig;

  store.total++;
  if (ok){
    state.answered = true;
    store.correct++; state.streak++;
    if (state.streak > store.best) store.best = state.streak;
    setFeedback("✅ " + chordName(c.rootPc, c.typeKey), "good");
    updateStats(); store.save();
    setTimeout(pickRandom, 850);
  } else {
    state.streak = 0; state.wrongTries++;
    store.bumpMiss(chordKey(c));
    updateStats(); store.save(); renderWeakList();
    setFeedback("❌ That's " + uniquePcs.slice().sort((a,b)=>a-b).map(p=>NOTE_NAMES[p]).join(" – ") + " — try again", "bad");
    const left = REVEAL_AFTER - state.wrongTries;
    document.getElementById("tries").textContent = left > 0 ? `${state.wrongTries} wrong · answer reveals after ${REVEAL_AFTER}` : "";
    if (state.wrongTries >= REVEAL_AFTER) reveal();
  }
}

// ---- reveal / live read ----
function reveal(){
  const c = state.current; if (!c) return;
  if (state.mode==="see"){
    document.querySelectorAll("#answers .answer").forEach(b=>{
      if (b.dataset.key === chordKey(c)) b.classList.add("correct");
    });
  } else {
    document.getElementById("chordName").innerHTML =
      `<span class="root">${NOTE_NAMES[c.rootPc]}</span> <span class="qual">${CHORD_TYPES[c.typeKey].label}</span>`;
  }
  const notesEl = document.getElementById("promptNotes");
  notesEl.className = "prompt-notes reveal";
  notesEl.textContent = c.targetPcs.map(p=>NOTE_NAMES[p]).join(" – ");
  piano.highlight(c.targetPcs);
}
function identify(){
  const notes = [...piano.held.keys()].sort((a,b)=>a-b);
  const el = document.getElementById("liveRead");
  if (!notes.length){ el.textContent=""; el.className="liveread"; return; }
  const bassPc = notes[0]%12;
  const pcs = [...new Set(notes.map(n=>n%12))];
  for (const [tk,tv] of Object.entries(CHORD_TYPES)){
    if (pcs.length !== tv.intervals.length) continue;
    for (const r of ROOTS){
      const chordPcs = tv.intervals.map(i=>(r+i)%12);
      const set = new Set(chordPcs);
      if (pcs.every(p=>set.has(p)) && chordPcs.every(p=>pcs.includes(p))){
        el.innerHTML = `You're playing: <b>${NOTE_NAMES[r]} ${tv.symbol}</b>`;
        el.className = "liveread match"; return;
      }
    }
  }
  el.innerHTML = "You're playing: <b>" + pcs.map(p=>NOTE_NAMES[p]).join(" ") + "</b>";
  el.className = "liveread";
}

// ---- helpers ----
function setFeedback(msg, cls){ const el=document.getElementById("feedback"); el.textContent=msg; el.className="feedback "+(cls||""); }
function updateStats(){
  document.getElementById("streak").textContent = state.streak;
  document.getElementById("best").textContent = store.best;
  document.getElementById("correct").textContent = store.correct;
  document.getElementById("total").textContent = store.total;
  document.getElementById("acc").textContent = store.total ? Math.round(store.correct/store.total*100)+"%" : "—";
}
function hearTarget(){
  const c = state.current; if(!c) return;
  Trainer.audio.hearNotes(voicingMidi(c.rootPc, c.typeKey, 0, 60));
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

// ---- weak list ----
function renderWeakList(){
  const el = document.getElementById("weakList");
  const entries = Object.entries(store.misses).filter(([,n])=>n>0).sort((a,b)=>b[1]-a[1]).slice(0,10);
  if (!entries.length){ el.innerHTML='<span class="none">No misses recorded yet — go get some wrong. 😄</span>'; return; }
  el.innerHTML = entries.map(([k,n])=> `• <b style="color:var(--text)">${keyLabel(k)}</b> — missed ${n}×`).join("<br>");
}

// ---- settings chips + controls ----
function buildChips(){
  const tc = document.getElementById("typeChips");
  Object.entries(CHORD_TYPES).forEach(([k,v])=>{
    const c=document.createElement("div"); c.className="chip on"; c.textContent=v.label;
    c.onclick=()=>{ toggle(state.types,k); c.classList.toggle("on"); ensureNonEmpty(); };
    tc.appendChild(c);
  });
  const rc = document.getElementById("rootChips");
  ROOTS.forEach(r=>{
    const c=document.createElement("div"); c.className="chip on"; c.textContent=NOTE_NAMES[r]; c.dataset.root=r;
    c.onclick=()=>{ toggle(state.roots,r); c.classList.toggle("on"); ensureNonEmpty(); };
    rc.appendChild(c);
  });
}
function toggle(set,v){ set.has(v)?set.delete(v):set.add(v); }
function ensureNonEmpty(){
  if (state.types.size===0){ state.types.add("maj"); document.querySelector('#typeChips .chip').classList.add("on"); }
  if (state.roots.size===0){ state.roots.add(0); document.querySelector('#rootChips .chip').classList.add("on"); }
}
function syncRootChips(){
  document.querySelectorAll("#rootChips .chip").forEach(c=> c.classList.toggle("on", state.roots.has(+c.dataset.root)));
}

document.getElementById("hearBtn").onclick = hearTarget;
document.getElementById("skipBtn").onclick = ()=>{ state.streak=0; updateStats(); pickRandom(); };
document.getElementById("revealBtn").onclick = reveal;
document.getElementById("autoHear").onchange = e=> state.opts.autoHear=e.target.checked;
document.getElementById("labels").onchange = e=>{ state.opts.labels=e.target.checked; piano.setLabels(e.target.checked); };
document.getElementById("sound").onchange = e=>{ state.opts.sound=e.target.checked; piano.setSound(e.target.checked); };
document.getElementById("instSel").onchange = e=>{ state.instrument=e.target.value; Trainer.audio.ac().resume(); Trainer.audio.loadInstrument(state.instrument, setSoundNote); };
document.getElementById("weakFocus").onchange = e=> state.weakFocus=e.target.checked;
document.getElementById("openVoicing").onchange = e=>{ state.openVoicing=e.target.checked; state.lastAttemptSig=null; };
document.getElementById("modeSeg").addEventListener("click", e=>{
  const b=e.target.closest("button"); if(!b) return;
  state.mode=b.dataset.mode;
  document.querySelectorAll("#modeSeg button").forEach(x=>x.classList.toggle("on", x===b));
  pickRandom();
});
document.getElementById("rootsAll").onclick = ()=>{ ROOTS.forEach(r=>state.roots.add(r)); syncRootChips(); };
document.getElementById("rootsNat").onclick = ()=>{ state.roots = new Set([0,2,4,5,7,9,11]); syncRootChips(); };
document.getElementById("resetStats").onclick = ()=>{
  if (!confirm("Reset streak, accuracy, and weak-spot history?")) return;
  store.resetAll(); state.streak=0; updateStats(); renderWeakList();
};
document.addEventListener("keydown", e=>{
  if (shell.isSettingsOpen()) return;
  if (e.key==="Enter") pickRandom();
  else if (e.key===" "){ e.preventDefault(); hearTarget(); }
});

function setSoundNote(t){ const el=document.getElementById("soundNote"); if(el) el.textContent=t; }

// ---- init ----
buildChips();
renderWeakList();
updateStats();
Trainer.audio.loadInstrument(state.instrument, setSoundNote);
pickRandom();
</script>
</body>
</html>
