<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#07080c" />
<meta name="description" content="Hands-free chord inversion trainer for MIDI keyboards — practice recognizing and playing chords across all inversions." />
<title>Chord Inversion Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/base.css" />
</head>
<body>
<div class="wrap" id="app">
  <!-- Trainer.shell injects the topbar + MIDI help banner here -->

  <div class="hero">
    <div class="eyebrow">Play this chord</div>
    <div id="chordName" class="chord-name"><span class="root">—</span></div>
    <div id="invBadge" class="inv-badge">Root position</div>
    <div id="bassline" class="bassline"></div>
    <div id="promptNotes" class="prompt-notes"></div>
    <div id="tries" class="tries"></div>
    <div id="feedback" class="feedback"></div>
    <div id="liveRead" class="liveread"></div>
    <div id="timerbar" class="timerbar"></div>
  </div>

  <div class="controls">
    <button id="hearBtn" class="playbtn" aria-label="Hear it" title="Hear it"><span class="tri">▶</span></button>
    <button id="skipBtn" class="secondary">Skip ⏭</button>
    <button id="revealBtn" class="secondary">Reveal notes</button>
  </div>

  <div class="piano-wrap"><div id="piano" class="piano"></div></div>

  <div class="stats-row">
    <div class="stats">
      <div class="stat"><div id="streak" class="n">0</div><div class="l">Streak</div></div>
      <div class="stat"><div id="best" class="n">0</div><div class="l">Best</div></div>
      <div class="stat"><div id="correct" class="n">0</div><div class="l">Correct</div></div>
      <div class="stat"><div id="total" class="n">0</div><div class="l">Attempts</div></div>
      <div class="stat"><div id="acc" class="n">—</div><div class="l">Accuracy</div></div>
    </div>
  </div>
</div>

<script src="../shared/theory.js"></script>
<script src="../shared/audio.js"></script>
<script src="../shared/piano.js"></script>
<script src="../shared/midi.js"></script>
<script src="../shared/store.js"></script>
<script src="../shared/shell.js"></script>
<script>
"use strict";
const T = Trainer.theory;
const { CHORD_TYPES, INV_NAMES, NOTE_NAMES, ROOTS, voicing, voicingMidi } = T;
const REVEAL_AFTER = 3;

const store = Trainer.store.open("chord-inversion", "chordTrainer.v2");

const state = {
  types: new Set(Object.keys(CHORD_TYPES)),
  inversions: new Set([0,1,2,3]),
  current: null,
  streak: 0,
  answered: false,
  wrongTries: 0,
  lastAttemptSig: null,
  mode: "relaxed",
  speedSecs: 10,
  weakFocus: true,
  openVoicing: false,
  earOnly: false,
  instrument: "piano",
  opts: { autoHear:false, labels:true, sound:true },
  timer: null, timerStart: 0,
};

function chordKey(c){ return c.rootPc+":"+c.typeKey+":"+c.inv; }
function keyLabel(k){
  const [r,t,i] = k.split(":");
  return NOTE_NAMES[+r]+" "+CHORD_TYPES[t].symbol+" · "+INV_NAMES[+i];
}

// ---- settings sections (rendered inside the shared modal) ----
const settingsSections = [
  { title:"Chord types & inversions", html:`
      <h4>Chord types</h4><div id="typeChips" class="chips"></div>
      <h4>Inversions</h4><div id="invChips" class="chips"></div>` },
  { title:"Practice mode & audio", html:`
      <h4>Mode</h4>
      <div class="row">
        <div class="seg" id="modeSeg">
          <button data-mode="relaxed" class="on">Relaxed</button>
          <button data-mode="speed">Speed / timed</button>
        </div>
        <label id="speedWrap" style="display:none;">Seconds per chord:
          <select id="speedSel"><option>5</option><option selected>10</option><option>15</option><option>20</option></select>
        </label>
      </div>
      <h4>Matching & challenge</h4>
      <div class="switch-list">
        <label class="switch"><input type="checkbox" id="openVoicing" /><span class="track"></span><span class="txt">Accept open voicings — any octave spread, as long as the bass note & chord tones are right</span></label>
        <label class="switch"><input type="checkbox" id="earOnly" /><span class="track"></span><span class="txt">Ear-only mode — hide the name, just play what you hear</span></label>
      </div>
      <h4>Weak-spot focus</h4>
      <div class="switch-list">
        <label class="switch"><input type="checkbox" id="weakFocus" checked /><span class="track"></span><span class="txt">Show my most-missed chords more often</span></label>
      </div>
      <h4>Audio & display</h4>
      <div class="switch-list">
        <label class="switch"><input type="checkbox" id="autoHear" /><span class="track"></span><span class="txt">Auto-play target on each new chord</span></label>
        <label class="switch"><input type="checkbox" id="labels" checked /><span class="track"></span><span class="txt">Note labels on keys</span></label>
        <label class="switch"><input type="checkbox" id="sound" checked /><span class="track"></span><span class="txt">Sound when I play</span></label>
      </div>
      <div class="row">
        <label>Instrument:
          <select id="instSel">
            <option value="piano">Acoustic Piano</option>
            <option value="epiano">Electric Piano</option>
            <option value="organ">Organ</option>
            <option value="synth">Synth</option>
          </select>
        </label>
        <span id="soundNote" style="color:var(--muted);font-size:12px;">loading piano…</span>
      </div>` },
  { title:"Weak spots & saved progress", html:`
      <h4>Most-missed (saved on this device)</h4>
      <div id="weakList" class="weak-list"><span class="none">No misses recorded yet — go get some wrong. 😄</span></div>
      <div class="row"><button id="resetStats" class="linkbtn">Reset all saved stats</button></div>` },
];

const shell = Trainer.shell.mount({
  mountEl: document.getElementById("app"),
  title: "Chord Inversion Trainer", subtitle: "hands free",
  settingsSections,
});

// ---- piano + MIDI ----
const piano = Trainer.piano.create(document.getElementById("piano"), {
  labels: state.opts.labels, sound: state.opts.sound,
  onNoteOn(){ identify(); evaluate(); },
  onNoteOff(){ state.lastAttemptSig = null; if(!state.answered) identify(); },
});
Trainer.midi.init({
  onNoteOn: n=> piano.noteOn(n),
  onNoteOff: n=> piano.noteOff(n),
  selectEl: shell.midiSelectEl, statusEl: shell.statusEl, helpEl: shell.helpEl,
});

// ---- chord selection (weak-spot weighted) ----
function allCandidates(){
  const out = [];
  for (const t of state.types){
    const n = CHORD_TYPES[t].intervals.length;
    for (const inv of state.inversions){ if (inv >= n) continue;
      for (const r of ROOTS) out.push({rootPc:r, typeKey:t, inv}); }
  }
  return out;
}
function pickRandom(){
  const cands = allCandidates();
  if (!cands.length) return;
  let chosen;
  if (state.weakFocus){
    const weights = cands.map(c => store.weightFor(chordKey(c)));
    let sum = weights.reduce((a,b)=>a+b,0), r = Math.random()*sum;
    for (let i=0;i<cands.length;i++){ r -= weights[i]; if (r<=0){ chosen = cands[i]; break; } }
    if (!chosen) chosen = cands[cands.length-1];
  } else {
    chosen = cands[Math.floor(Math.random()*cands.length)];
  }
  chosen.targetPcs = voicing(chosen.rootPc, chosen.typeKey, chosen.inv);
  state.current = chosen;
  piano.clear();
  state.answered = false; state.wrongTries = 0; state.lastAttemptSig = null;
  render();
  if (state.opts.autoHear || state.earOnly) setTimeout(hearTarget, 300);
  if (state.mode === "speed") startTimer();
}

// ---- render ----
function fillChordInfo(c){
  document.getElementById("chordName").innerHTML =
    `<span class="root">${NOTE_NAMES[c.rootPc]}</span> <span class="qual">${CHORD_TYPES[c.typeKey].label}</span>`;
  document.getElementById("invBadge").textContent = INV_NAMES[c.inv];
  document.getElementById("bassline").innerHTML =
    state.openVoicing
      ? `Bass note must be <b>${NOTE_NAMES[c.targetPcs[0]]}</b> — spread the other notes anywhere`
      : `Lowest note (bass): <b>${NOTE_NAMES[c.targetPcs[0]]}</b>`;
}
function render(){
  const c = state.current;
  const nameEl = document.getElementById("chordName");
  const notesEl = document.getElementById("promptNotes");
  if (!c){ nameEl.innerHTML = '<span class="root">—</span>'; return; }
  if (state.earOnly){
    nameEl.innerHTML = '<span class="qual">🎧 Listen…</span>';
    document.getElementById("invBadge").textContent = "Ear-only";
    document.getElementById("bassline").innerHTML = "Reproduce what you hear — press <b>▶</b> to replay";
  } else {
    fillChordInfo(c);
  }
  notesEl.className = "prompt-notes"; notesEl.textContent = "";
  document.getElementById("feedback").textContent = ""; document.getElementById("feedback").className = "feedback";
  document.getElementById("liveRead").textContent = "";
  document.getElementById("tries").textContent = "";
  nameEl.classList.remove("pop"); void nameEl.offsetWidth; nameEl.classList.add("pop");
  piano.clearHighlight();
}
function reveal(){
  const c = state.current; if (!c) return;
  if (state.earOnly) fillChordInfo(c);
  const notesEl = document.getElementById("promptNotes");
  notesEl.className = "prompt-notes reveal";
  notesEl.textContent = c.targetPcs.map(p=>NOTE_NAMES[p]).join(" – ") + "  (bottom → top)";
  piano.highlight(c.targetPcs);
}

// ---- evaluate ----
function evaluate(){
  const c = state.current;
  if (!c || state.answered) return;
  const notes = [...piano.held.keys()].sort((a,b)=>a-b);
  if (!notes.length) return;
  const playedPcs = notes.map(n=>n%12);
  const bassPc = playedPcs[0];
  const uniquePcs = [...new Set(playedPcs)];
  const targetSet = new Set(c.targetPcs);

  let ok, sig;
  if (state.openVoicing){
    if (uniquePcs.length !== c.targetPcs.length) return;
    sig = bassPc + "|" + [...uniquePcs].sort((a,b)=>a-b).join(",");
    if (sig === state.lastAttemptSig) return;
    const rightTones = c.targetPcs.every(p=>uniquePcs.includes(p)) && uniquePcs.every(p=>targetSet.has(p));
    ok = rightTones && bassPc === c.targetPcs[0];
  } else {
    if (notes.length !== c.targetPcs.length) return;
    sig = playedPcs.join(",");
    if (sig === state.lastAttemptSig) return;
    ok = playedPcs.every((p,i)=> p === c.targetPcs[i]);
  }
  state.lastAttemptSig = sig;

  store.total++;
  if (ok){
    state.answered = true;
    store.correct++; state.streak++;
    if (state.streak > store.best) store.best = state.streak;
    stopTimer();
    if (state.earOnly) fillChordInfo(c);
    setFeedback(state.earOnly
      ? `✅ ${NOTE_NAMES[c.rootPc]} ${CHORD_TYPES[c.typeKey].label} · ${INV_NAMES[c.inv]}`
      : "✅ Correct!", "good");
    updateStats(); store.save();
    setTimeout(pickRandom, 750);
  } else {
    state.streak = 0; state.wrongTries++;
    store.bumpMiss(chordKey(c));
    updateStats(); store.save(); renderWeakList();
    setFeedback("❌ That's " + playedPcs.map(p=>NOTE_NAMES[p]).join(" – ") + " — try again", "bad");
    const left = REVEAL_AFTER - state.wrongTries;
    document.getElementById("tries").textContent = left > 0 ? `${state.wrongTries} wrong · notes reveal after ${REVEAL_AFTER}` : "";
    if (state.wrongTries >= REVEAL_AFTER) reveal();
  }
}
function setFeedback(msg, cls){ const el=document.getElementById("feedback"); el.textContent=msg; el.className="feedback "+(cls||""); }
function updateStats(){
  document.getElementById("streak").textContent = state.streak;
  document.getElementById("best").textContent = store.best;
  document.getElementById("correct").textContent = store.correct;
  document.getElementById("total").textContent = store.total;
  document.getElementById("acc").textContent = store.total ? Math.round(store.correct/store.total*100)+"%" : "—";
}

// ---- live chord identification ----
function identify(){
  const notes = [...piano.held.keys()].sort((a,b)=>a-b);
  const el = document.getElementById("liveRead");
  if (!notes.length){ el.textContent=""; el.className="liveread"; return; }
  const bassPc = notes[0]%12;
  const pcs = [...new Set(notes.map(n=>n%12))];
  for (const [tk,tv] of Object.entries(CHORD_TYPES)){
    if (pcs.length !== tv.intervals.length) continue;
    for (const r of ROOTS){
      const chordPcs = tv.intervals.map(i=>(r+i)%12);
      const set = new Set(chordPcs);
      if (pcs.every(p=>set.has(p)) && chordPcs.every(p=>pcs.includes(p))){
        const inv = chordPcs.indexOf(bassPc);
        el.innerHTML = `You're playing: <b>${NOTE_NAMES[r]} ${tv.symbol} · ${INV_NAMES[inv]}</b>`;
        el.className = "liveread match"; return;
      }
    }
  }
  el.innerHTML = "You're playing: <b>" + pcs.map(p=>NOTE_NAMES[p]).join(" ") + "</b>";
  el.className = "liveread";
}

// ---- audio prompt ----
function hearTarget(){
  const c = state.current; if(!c) return;
  Trainer.audio.hearNotes(voicingMidi(c.rootPc, c.typeKey, c.inv, 60));
}

// ---- timer (speed mode) ----
function startTimer(){
  stopTimer();
  const bar = document.getElementById("timerbar");
  bar.style.opacity = "1"; bar.style.transition = "none"; bar.style.transform = "scaleX(1)";
  state.timerStart = performance.now();
  const total = state.speedSecs*1000;
  function tick(){
    const elapsed = performance.now() - state.timerStart;
    const frac = Math.max(0, 1 - elapsed/total);
    bar.style.transition = "transform .1s linear"; bar.style.transform = "scaleX("+frac+")";
    if (elapsed >= total){ timeUp(); return; }
    state.timer = requestAnimationFrame(tick);
  }
  state.timer = requestAnimationFrame(tick);
}
function stopTimer(){ if (state.timer){ cancelAnimationFrame(state.timer); state.timer=null; } document.getElementById("timerbar").style.opacity="0"; }
function timeUp(){
  stopTimer();
  const c = state.current;
  if (c) store.bumpMiss(chordKey(c));
  state.streak = 0; state.answered = true; store.total++;
  setFeedback("⏱ Time's up!", "bad");
  reveal(); updateStats(); store.save(); renderWeakList();
  setTimeout(pickRandom, 1400);
}

// ---- weak list ----
function renderWeakList(){
  const el = document.getElementById("weakList");
  const entries = Object.entries(store.misses).filter(([,n])=>n>0).sort((a,b)=>b[1]-a[1]).slice(0,10);
  if (!entries.length){ el.innerHTML='<span class="none">No misses recorded yet — go get some wrong. 😄</span>'; return; }
  el.innerHTML = entries.map(([k,n])=> `• <b style="color:var(--text)">${keyLabel(k)}</b> — missed ${n}×`).join("<br>");
}

// ---- settings chips + controls ----
function buildChips(){
  const tc = document.getElementById("typeChips");
  Object.entries(CHORD_TYPES).forEach(([k,v])=>{
    const c=document.createElement("div"); c.className="chip on"; c.textContent=v.label;
    c.onclick=()=>{ toggle(state.types,k); c.classList.toggle("on"); ensureNonEmpty(); };
    tc.appendChild(c);
  });
  const ic = document.getElementById("invChips");
  INV_NAMES.forEach((name,i)=>{
    const c=document.createElement("div"); c.className="chip on"; c.textContent=name;
    c.onclick=()=>{ toggle(state.inversions,i); c.classList.toggle("on"); ensureNonEmpty(); };
    ic.appendChild(c);
  });
}
function toggle(set,v){ set.has(v)?set.delete(v):set.add(v); }
function ensureNonEmpty(){
  if (state.types.size===0){ state.types.add("maj"); document.querySelectorAll("#typeChips .chip")[0].classList.add("on"); }
  if (state.inversions.size===0){ state.inversions.add(0); document.querySelectorAll("#invChips .chip")[0].classList.add("on"); }
}

document.getElementById("hearBtn").onclick = hearTarget;
document.getElementById("revealBtn").onclick = reveal;
document.getElementById("skipBtn").onclick = ()=>{ state.streak=0; updateStats(); pickRandom(); };
document.getElementById("autoHear").onchange = e=> state.opts.autoHear=e.target.checked;
document.getElementById("labels").onchange = e=>{ state.opts.labels=e.target.checked; piano.setLabels(e.target.checked); };
document.getElementById("sound").onchange = e=>{ state.opts.sound=e.target.checked; piano.setSound(e.target.checked); };
document.getElementById("instSel").onchange = e=>{ state.instrument=e.target.value; Trainer.audio.ac().resume(); Trainer.audio.loadInstrument(state.instrument, setSoundNote); };
document.getElementById("weakFocus").onchange = e=> state.weakFocus=e.target.checked;
document.getElementById("openVoicing").onchange = e=>{ state.openVoicing=e.target.checked; if(state.current){ state.lastAttemptSig=null; if(!state.earOnly) fillChordInfo(state.current); } };
document.getElementById("earOnly").onchange = e=>{ state.earOnly=e.target.checked; render(); if(state.earOnly) setTimeout(hearTarget,300); };
document.getElementById("speedSel").onchange = e=>{ state.speedSecs=+e.target.value; };
document.getElementById("modeSeg").addEventListener("click", e=>{
  const b=e.target.closest("button"); if(!b) return;
  state.mode=b.dataset.mode;
  document.querySelectorAll("#modeSeg button").forEach(x=>x.classList.toggle("on", x===b));
  document.getElementById("speedWrap").style.display = state.mode==="speed" ? "flex" : "none";
  if (state.mode==="speed") startTimer(); else stopTimer();
});
document.getElementById("resetStats").onclick = ()=>{
  if (!confirm("Reset streak, accuracy, and weak-spot history?")) return;
  store.resetAll(); state.streak=0; updateStats(); renderWeakList();
};
document.addEventListener("keydown", e=>{
  if (shell.isSettingsOpen()) return;   // don't advance chords while settings are open
  if (e.key==="Enter") pickRandom();
});

function setSoundNote(t){ const el=document.getElementById("soundNote"); if(el) el.textContent=t; }

// ---- init ----
buildChips();
renderWeakList();
updateStats();
Trainer.audio.loadInstrument(state.instrument, setSoundNote);
pickRandom();
</script>
</body>
</html>
