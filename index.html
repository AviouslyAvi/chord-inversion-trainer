<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#07080c" />
<meta name="description" content="A hands-free music-theory practice suite for MIDI keyboards — chords, inversions, intervals, scales, and ear training." />
<title>Chord Trainer Suite</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shared/base.css" />
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand"><span class="dot"></span>Chord Trainer <small>— hands free</small></div>
  </div>

  <div class="hub-hero">
    <h1>Practice music theory <span class="accent">at the keys</span></h1>
    <p>A focused set of exercises for your MIDI keyboard — pick a skill and drill it. Mouse and touch work too; a MIDI keyboard just makes it hands-free.</p>
  </div>

  <div class="grid" id="grid"></div>

</div>

<script src="shared/theory.js"></script>
<script>
"use strict";
// Each exercise: {name, href, ico, desc, ready}. Set ready:true as each batch ships.
const EXERCISES = [
  { name:"Learn the Keys", href:"exercises/learn-keys.html", ico:"🎓",
    desc:"A guided, level-by-level course — learn the keyboard and read notes.", ready:true },
  { name:"Learn Chord Types", href:"exercises/learn-chord-types.html", ico:"🎓",
    desc:"A guided course — recognize major, minor, dim & 7th chords by type.", ready:true },
  { name:"Learn Chord Inversions", href:"exercises/learn-inversions.html", ico:"🎓",
    desc:"A guided course — play chords in every inversion, white keys to all twelve.", ready:true },
  { name:"Chord Inversion Trainer", href:"exercises/chord-inversion.html", ico:"🎹",
    desc:"Play the named chord in the right inversion.", ready:true },
  { name:"Chord Identification", href:"exercises/chord-id.html", ico:"🎵",
    desc:"See or hear a chord, then name or play it.", ready:true },
  { name:"Interval Trainer", href:"exercises/interval.html", ico:"📏",
    desc:"Identify and play intervals by sight and ear.", ready:true },
  { name:"Scale Identification", href:"exercises/scale.html", ico:"🎼",
    desc:"Recognize and play scales and modes.", ready:true },
  { name:"Ear: Melody Playback", href:"exercises/ear-melody.html", ico:"👂",
    desc:"Hear a short melody, then play it back.", ready:true },
  { name:"Note Finder", href:"exercises/note-finder.html", ico:"🔎",
    desc:"Find the named note on the keyboard.", ready:true },
];
const grid = document.getElementById("grid");
grid.innerHTML = EXERCISES.map(e=>{
  const cls = "card" + (e.ready ? "" : " soon");
  const badge = e.ready ? "" : `<span class="badge">Soon</span>`;
  const inner = `${badge}<div class="ico">${e.ico}</div><h3>${e.name}</h3><p>${e.desc}</p>`;
  return e.ready
    ? `<a class="${cls}" href="${e.href}">${inner}</a>`
    : `<div class="${cls}">${inner}</div>`;
}).join("");
</script>
</body>
</html>
